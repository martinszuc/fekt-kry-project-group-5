name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache liboqs build
        id: cache-liboqs
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/liboqs.so
          key: liboqs-0.15.0

      - name: Build and install liboqs shared library
        if: steps.cache-liboqs.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y cmake gcc
          git clone --depth 1 --branch 0.15.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -S /tmp/liboqs -B /tmp/liboqs/build -DBUILD_SHARED_LIBS=ON
          cmake --build /tmp/liboqs/build --parallel 4
          sudo cmake --install /tmp/liboqs/build

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
